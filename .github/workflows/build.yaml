name: Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup HEMTT
        uses: arma-actions/hemtt@v1

      - name: Run HEMTT build
        run: hemtt release

      - name: Upload Release
        uses: actions/upload-artifact@v4
        with:
          name: gunmetal-grooves
          path: release/gunmetal-grooves.zip